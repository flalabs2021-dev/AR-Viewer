<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Butterfield BESS — AR | Chaberton Energy</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #0a0f1a; font-family: 'Lato', sans-serif; overflow: hidden; }

    model-viewer {
      width: 100%; height: 100%;
      position: fixed; inset: 0;
      --poster-color: transparent;
      background-color: transparent;
    }

    /* Loading screen shown until model is ready */
    #loading {
      position: fixed; inset: 0; z-index: 50;
      background: #0a0f1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1rem; color: white; text-align: center; padding: 2rem;
      transition: opacity 0.5s;
    }

    #loading img { height: 36px; width: auto; margin-bottom: 0.5rem; }
    #loading p { font-size: 0.85rem; color: rgba(255,255,255,0.6); max-width: 260px; line-height: 1.6; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(245,184,0,0.2);
      border-top-color: #f5b800;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Ready screen - shown after model loads, before AR starts */
    #ready {
      display: none;
      position: fixed; inset: 0; z-index: 40;
      background: #0a0f1a;
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.2rem; padding: 2rem; text-align: center;
    }

    #ready img { height: 36px; width: auto; }
    #ready h2 { font-size: 1.2rem; color: white; font-weight: 700; }
    #ready p { font-size: 0.82rem; color: rgba(255,255,255,0.6); max-width: 280px; line-height: 1.6; }

    #start-ar-btn {
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
      background: #f5b800; color: #1e2d4a;
      font-family: 'Lato', sans-serif; font-weight: 900;
      font-size: 0.9rem; letter-spacing: 0.06em; text-transform: uppercase;
      border: none; border-radius: 6px;
      padding: 1rem 2rem; cursor: pointer;
      box-shadow: 0 4px 20px rgba(245,184,0,0.3);
    }

    /* AR overlay */
    #ar-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 30;
      pointer-events: none;
    }

    #ar-overlay.visible { display: block; }

    #topbar {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 0.8rem 1.2rem;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
      pointer-events: auto;
    }

    #topbar img { height: 22px; width: auto; }

    #live-badge {
      font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: #f5b800; background: rgba(0,0,0,0.6);
      border: 1px solid rgba(245,184,0,0.4);
      padding: 0.2rem 0.6rem; border-radius: 3px;
    }

    #hint {
      position: absolute; bottom: 6rem; left: 50%; transform: translateX(-50%);
      background: rgba(30,45,74,0.92); border: 1px solid rgba(245,184,0,0.35);
      border-radius: 20px; padding: 0.55rem 1.3rem;
      font-size: 0.75rem; color: white; white-space: nowrap;
      transition: opacity 0.5s;
    }

    #exit-btn {
      position: absolute; bottom: 1.5rem; right: 1.2rem;
      background: rgba(30,45,74,0.92); border: 1px solid rgba(245,184,0,0.35);
      color: white; border-radius: 6px;
      font-family: 'Lato', sans-serif; font-weight: 700; font-size: 0.72rem;
      padding: 0.55rem 1.1rem; cursor: pointer; pointer-events: auto;
    }
  </style>
</head>
<body>

<!-- Loading screen -->
<div id="loading">
  <img src="chaberton-energy.webp" alt="Chaberton Energy" onerror="this.style.display='none'" />
  <div class="spinner"></div>
  <p>Loading model…<br>This may take a moment on first load.</p>
</div>

<!-- Ready screen (after model loads) -->
<div id="ready">
  <img src="chaberton-energy.webp" alt="Chaberton Energy" onerror="this.style.display='none'" />
  <h2>Model Ready</h2>
  <p>Point your camera at the ground near your reference marker, then tap Launch to place the model.</p>
  <button id="start-ar-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
    </svg>
    Launch AR
  </button>
</div>

<!-- AR overlay -->
<div id="ar-overlay">
  <div id="topbar">
    <img src="chaberton-energy.webp" alt="Chaberton Energy" onerror="this.style.display='none'" />
    <span id="live-badge">● LIVE AR</span>
  </div>
  <div id="hint">Drag to move · Twist two fingers to rotate</div>
  <button id="exit-btn">✕ Exit AR</button>
</div>

<!-- Model viewer (invisible until AR starts) -->
<model-viewer
  id="mv"
  src="Butterfield%20BESS%20Site%20FINAL.glb"
  ar
  ar-modes="webxr"
  ar-scale="fixed"
  shadow-intensity="0"
  shadow-softness="0"
  style="position:fixed; width:1px; height:1px; opacity:0; pointer-events:none; top:0; left:0;">
  <button slot="ar-button" id="ar-btn" style="display:none;"></button>
</model-viewer>

<script>
  const mv = document.getElementById('mv');
  const loading = document.getElementById('loading');
  const ready = document.getElementById('ready');
  const arOverlay = document.getElementById('ar-overlay');
  const hint = document.getElementById('hint');
  const startArBtn = document.getElementById('start-ar-btn');
  const exitBtn = document.getElementById('exit-btn');

  // When model finishes loading, show ready screen
  mv.addEventListener('load', () => {
    loading.style.opacity = '0';
    setTimeout(() => {
      loading.style.display = 'none';
      ready.style.display = 'flex';
    }, 500);
  });

  // Timeout fallback
  setTimeout(() => {
    if (loading.style.display !== 'none') {
      loading.querySelector('p').textContent = 'Taking longer than expected… check your connection and try reloading.';
      loading.querySelector('.spinner').style.display = 'none';
    }
  }, 25000);

  // Launch AR when user is ready
  startArBtn.addEventListener('click', () => {
    ready.style.display = 'none';
    mv.activateAR();
  });

  // AR session events
  mv.addEventListener('ar-status', (e) => {
    if (e.detail.status === 'session-started') {
      arOverlay.classList.add('visible');
      setTimeout(() => { hint.style.opacity = '0'; }, 5000);
    }
    if (e.detail.status === 'not-presenting') {
      arOverlay.classList.remove('visible');
      window.location.href = 'index.html';
    }
    if (e.detail.status === 'failed') {
      alert('AR failed to start. Make sure ARCore is installed and camera permission is granted.');
      window.location.href = 'index.html';
    }
  });

  exitBtn.addEventListener('click', () => {
    mv.exitPresentationMode?.();
    window.location.href = 'index.html';
  });
</script>
</body>
</html>
